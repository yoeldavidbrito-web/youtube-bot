<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mage Arcane Gaming</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f16;
      --panel: #101722;
      --text: #f4f7fb;
      --muted: #b6c0cf;
      --accent: #ff355e;
      --line: #223044;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 53, 94, 0.16), transparent 28%),
        linear-gradient(180deg, #07090d 0%, var(--bg) 100%);
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 20px 80px;
    }
    .card {
      background: rgba(16, 23, 34, 0.94);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 53, 94, 0.12);
      color: #ff8aa3;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(34px, 6vw, 60px);
      line-height: 1.05;
    }
    p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }
    .links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    a.button {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ff355e, #ff6b88);
    }
    a.ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="eyebrow">Mage Arcane Gaming</div>
      <h1>Creator automation workflows for short-form video publishing.</h1>
      <p>
        This project supports local video generation, creator review workflows, and private uploads for short-form content publishing.
      </p>
      <div class="links">
        <a class="button" href="./privacy.html">Privacy Policy</a>
        <a class="button ghost" href="./terms.html">Terms of Service</a>
      </div>
    </section>
  </main>
</body>
</html>
